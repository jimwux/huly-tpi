
#SERVER
server.port=8080

#CORS
frontend.url=http://localhost:5173

#DATABASE - H2 en memoria para dev (comentar cuando haya PostgreSQL)
#spring.datasource.url=jdbc:postgresql://localhost:5432/huly
#spring.datasource.username=postgres
#spring.datasource.password=4672
spring.datasource.url=jdbc:h2:mem:hulydev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

#JPA - auto-crea el schema desde las entidades en dev
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

#FLYWAY - deshabilitado en dev (usamos ddl-auto en su lugar)
spring.flyway.enabled=false

#SPRING AI JDBC - inicializar schema automaticamente
spring.ai.chat.memory.repository.jdbc.initialize-schema=always

#SWAGGER
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
