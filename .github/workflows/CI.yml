# .GitHub/workflows/CI.yml
name: CI Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'backend/**'
      - '.github/workflows/CI.yml'

  pull_request:
    branches: [ main, dev ]
    types: [opened, reopened, synchronize, edited]
    paths:
      - 'backend/**'
      - '.github/workflows/CI.yml'

jobs:


  # SOLO CONTROL DE PRs HACIA MAIN

  restrict-main-pr:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.base_ref == 'main'

    steps:
      - name: Show context
        run: |
          echo "=== PR CONTEXT ==="
          echo "EVENT:       ${{ github.event_name }}"
          echo "BASE REF:    ${{ github.base_ref }}"
          echo "HEAD REF:    ${{ github.head_ref }}"
          echo "RUN ATTEMPT: ${{ github.run_attempt }}"
          echo "==============="

      - name: Block PRs to main unless from dev
        run: |
          if [[ "${{ github.head_ref }}" != "dev" ]]; then
            echo "❌ Solo se permiten PRs a main desde 'dev'."
            echo "HEAD = '${{ github.head_ref }}', BASE = '${{ github.base_ref }}'"
            exit 1
          fi

          echo "✔ PR válido hacia main"


  # BACKEND BUILD — DEV + MAIN

  build-backend:
    runs-on: ubuntu-latest
    if: >
      github.ref_name == 'dev' ||
      github.ref_name == 'main' ||
      github.base_ref == 'dev' ||
      github.base_ref == 'main'

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build backend with Maven
        run: mvn clean install -DskipTests=true


  # TEST COVERAGE — DEV + MAIN

  test-coverage:
    runs-on: ubuntu-latest
    if: >
      github.ref_name == 'dev' ||
      github.ref_name == 'main' ||
      github.base_ref == 'dev' ||
      github.base_ref == 'main'

    permissions:
      contents: read
      pull-requests: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: huly
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run tests with coverage
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/huly
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
        run: mvn verify

      - name: Coverage summary
        run: |
          pct=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('target/site/jacoco/jacoco.xml')
          for c in tree.getroot().findall('counter'):
              if c.get('type') == 'LINE':
                  cov, mis = int(c.get('covered')), int(c.get('missed'))
                  tot = cov + mis
                  print(f'{cov/tot*100:.1f}' if tot else '0.0')
                  break
          ")
          echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Line coverage | **${pct}%** |" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

      - name: Post coverage comment on PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: backend/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: 'Test Coverage'
          min-coverage-overall: 0
          min-coverage-changed-files: 0
