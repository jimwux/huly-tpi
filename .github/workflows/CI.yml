# .github/workflows/CI.yml
name: CI Build

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'backend/**'
      - '.github/workflows/CI.yml'

  pull_request:
    branches: [ main, dev ]
    types: [opened, reopened, synchronize, edited]
    paths:
      - 'backend/**'
      - '.github/workflows/CI.yml'

jobs:


  # SOLO CONTROL DE PRs HACIA MAIN

  restrict-main-pr:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.base_ref == 'main'

    steps:
      - name: Show context
        run: |
          echo "=== PR CONTEXT ==="
          echo "EVENT:       ${{ github.event_name }}"
          echo "BASE REF:    ${{ github.base_ref }}"
          echo "HEAD REF:    ${{ github.head_ref }}"
          echo "RUN ATTEMPT: ${{ github.run_attempt }}"
          echo "==============="

      - name: Block PRs to main unless from dev
        run: |
          if [[ "${{ github.head_ref }}" != "dev" ]]; then
            echo "❌ Solo se permiten PRs a main desde 'dev'."
            echo "HEAD = '${{ github.head_ref }}', BASE = '${{ github.base_ref }}'"
            exit 1
          fi

          echo "✔ PR válido hacia main"


  # BACKEND BUILD — DEV + MAIN

  build-backend:
    runs-on: ubuntu-latest
    if: >
      github.ref_name == 'dev' ||
      github.ref_name == 'main' ||
      github.base_ref == 'dev' ||
      github.base_ref == 'main'

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build backend with Maven
        run: mvn clean install -DskipTests=true


